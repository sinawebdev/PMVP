services:
  - type: web
    name: chrisnat-payroll-mvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chrisnat-payroll-db
          property: connectionString

databases:
  - name: chrisnat-payroll-db
    databaseName: chrisnat_payroll
    user: chrisnat_payroll_user
    plan: free
