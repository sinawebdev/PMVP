services:
  - type: web
    name: chrisnat-payroll-mvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Apply Alembic migrations before serving so schema changes actually reach
    # the database. (Previously nothing ran migrations, so columns added in
    # migrations never existed in the deployed DB and pages 500'd.)
    # --timeout 300: the seed confirm (181 employees + rate rows + payslip compute
    # + workbook archive) can run for minutes on the free plan's 0.1 CPU; keep
    # gunicorn from SIGKILLing it mid-write.
    # --threads 4: the single SYNC worker was blocking Render's /health probe while
    # a confirm ran, so Render's 5-second health-check timeout restarted the
    # instance mid-confirm (transaction rolled back -> "Network error" + 502, no
    # SIGKILL). gthread lets /health be answered concurrently on a spare thread.
    # Single WORKER kept deliberately — the free plan's 512MB doesn't fit two
    # pandas-loaded workers; threads add concurrency without a second process.
    startCommand: flask db upgrade && gunicorn run:app --bind 0.0.0.0:10000 --timeout 300 --threads 4
    healthCheckPath: /health
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL points at the Supabase-hosted Postgres and is managed in the
      # Render dashboard. sync:false stops Blueprint syncs from overwriting it
      # (it must NOT be bound to a Render-managed database).
      - key: DATABASE_URL
        sync: false
      # Schema is owned by migrations now, not create_all().
      - key: AUTO_INIT_DB
        value: "false"
      - key: PERSISTENCE_REQUIRED
        value: "true"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SEED_ARCHIVED_FEATURES
        value: "false"
      # Distribution worker (Phase 4). Default: the web process runs the worker on
      # an in-process thread (free-plan friendly; the queue lives in Postgres and
      # survives restarts). To split it onto its own service, set this to "false"
      # here and enable the `worker` service below (needs a paid Background Worker).
      - key: DISTRIBUTION_WORKER_INLINE
        value: "true"

  # --- Optional dedicated distribution worker (Phase 4) --------------------
  # Uncomment to run sending on its own process. Requires a paid Render
  # Background Worker; also flip DISTRIBUTION_WORKER_INLINE to "false" on `web`.
  # - type: worker
  #   name: chrisnat-distribution-worker
  #   runtime: python
  #   buildCommand: pip install -r requirements.txt
  #   startCommand: flask --app run:app distribution-worker
  #   envVars:
