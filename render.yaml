services:
  - type: web
    name: chrisnat-payroll-mvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:10000
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chrisnat-payroll-db
          property: connectionString
      - key: AUTO_INIT_DB
        value: "true"
      - key: PERSISTENCE_REQUIRED
        value: "true"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SEED_ARCHIVED_FEATURES
        value: "false"

databases:
  - name: chrisnat-payroll-db
    databaseName: chrisnat_payroll
    user: chrisnat_payroll_user
    plan: free
