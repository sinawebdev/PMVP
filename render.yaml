services:
  - type: web
    name: chrisnat-payroll-mvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Apply Alembic migrations before serving so schema changes actually reach
    # the database. (Previously nothing ran migrations, so columns added in
    # migrations never existed in the deployed DB and pages 500'd.)
    startCommand: flask db upgrade && gunicorn run:app --bind 0.0.0.0:10000
    healthCheckPath: /health
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL points at the Supabase-hosted Postgres and is managed in the
      # Render dashboard. sync:false stops Blueprint syncs from overwriting it
      # (it must NOT be bound to a Render-managed database).
      - key: DATABASE_URL
        sync: false
      # Schema is owned by migrations now, not create_all().
      - key: AUTO_INIT_DB
        value: "false"
      - key: PERSISTENCE_REQUIRED
        value: "true"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SEED_ARCHIVED_FEATURES
        value: "false"
