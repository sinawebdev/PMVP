services:

  db:
    image: postgres:16-alpine
    container_name: payrolla_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       payrolla
      POSTGRES_USER:     payrolla
      POSTGRES_PASSWORD: payrolla_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port publish by default — the web service reaches the DB internally
    # on db:5432. The host already runs Postgres on 5432. To inspect the DB from
    # the host, add e.g.  ports: ["5433:5432"]  (pick any free host port).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payrolla -d payrolla"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: payrolla_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP:        "app:create_app"
      FLASK_ENV:        development
      FLASK_DEBUG:      "1"
      # Inside the compose network the database is reached via the service
      # name `db`, never localhost.
      DATABASE_URL:     "postgresql://payrolla:payrolla_dev@db:5432/payrolla"
      SECRET_KEY:       "change-this-in-production"
      # The app's load_dotenv() must not pull the local-dev .env (which leaves
      # DATABASE_URL unset for SQLite) into the container.
      SKIP_DOTENV:      "true"
      PERSISTENCE_REQUIRED: "true"
      # Split the distribution worker onto its own container (below), mirroring a
      # production web/worker split, so the web process does not also send.
      DISTRIBUTION_WORKER_INLINE: "false"
    ports:
      - "5000:5000"
    volumes:
      - .:/app          # live-reload: code changes apply without rebuild
    command: flask run --host=0.0.0.0 --port=5000

  # Dedicated distribution worker (Phase 4) — the same image, running the queue
  # worker instead of the web server. Handles SIGTERM for a graceful shutdown.
  worker:
    build: .
    container_name: payrolla_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP:        "run.py"
      DATABASE_URL:     "postgresql://payrolla:payrolla_dev@db:5432/payrolla"
      SECRET_KEY:       "change-this-in-production"
      SKIP_DOTENV:      "true"
      PERSISTENCE_REQUIRED: "true"
      AUTO_INIT_DB:     "false"
      DISTRIBUTION_WORKER_NAME: "compose-worker"
    volumes:
      - .:/app
    command: flask --app run:app distribution-worker

volumes:
  pgdata:
    driver: local       # data survives container restarts and rebuilds
