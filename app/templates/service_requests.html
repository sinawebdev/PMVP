{% extends "base.html" %}{% block page_title %}Service Requests{% endblock %}{% block content %}<section class="panel"><form class="row g-2 mb-3"><div class="col-md-5"><select class="form-select" name="client_id"><option value="">All clients</option>{% for client in clients %}<option value="{{ client.id }}">{{ client.name }}</option>{% endfor %}</select></div><div class="col-md-4"><select class="form-select" name="status"><option value="">All statuses</option>{% for status in statuses %}<option>{{ status }}</option>{% endfor %}</select></div><div class="col-md-3"><button class="btn btn-outline-primary w-100">Filter</button></div></form><table class="table"><thead><tr><th>Client</th><th>Type</th><th>Title</th><th>Priority</th><th>Status</th><th></th></tr></thead><tbody>{% for row in requests %}<tr><td>{{ row.client_company.name }}</td><td>{{ row.request_type }}</td><td>{{ row.title }}</td><td>{{ row.priority }}</td><td>{{ row.status }}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('phase3.service_request_detail', request_id=row.id) }}">View</a></td></tr>{% endfor %}</tbody></table></section>{% endblock %}
