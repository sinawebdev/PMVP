{% extends "base.html" %}{% block page_title %}New Goods Order{% endblock %}{% block content %}<section class="panel"><form method="post" class="row g-3">{% if not client_mode %}<div class="col-md-4"><label class="form-label">Client</label><select class="form-select" name="client_company_id">{% for client in clients %}<option value="{{ client.id }}" {% if order and order.client_company_id == client.id %}selected{% endif %}>{{ client.name }}</option>{% endfor %}</select></div>{% endif %}<div class="col-md-4"><label class="form-label">Order Date</label><input class="form-control" type="date" name="order_date" value="{{ order.order_date if order else '' }}"></div><div class="col-md-4"><label class="form-label">Requested Delivery</label><input class="form-control" type="date" name="requested_delivery_date" value="{{ order.requested_delivery_date if order else '' }}"></div><div class="col-md-6"><label class="form-label">Delivery Location</label><input class="form-control" name="delivery_location" value="{{ order.delivery_location if order else '' }}"></div><div class="col-md-6"><label class="form-label">Status</label><select class="form-select" name="status">{% for status in statuses %}<option {% if order and order.status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div>{% if not order %}<div class="col-md-8"><label class="form-label">Product</label><select class="form-select" name="product_id">{% for product in products %}<option value="{{ product.id }}">{{ product.product_name }} (stock {{ product.current_stock }})</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Quantity</label><input class="form-control" name="quantity" value="1"></div>{% endif %}<div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes">{{ order.notes if order else '' }}</textarea></div><div class="col-12"><button class="btn btn-primary">Save Goods Order</button></div></form></section>{% endblock %}
