{% extends "base.html" %}
{% block page_title %}Transfer Worker{% endblock %}
{% block content %}<section class="panel"><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Transfer Date</label><input class="form-control" type="date" name="transfer_date" required></div><div class="col-md-4"><label class="form-label">New Client</label><select class="form-select" name="client_company_id">{% for client in clients %}<option value="{{ client.id }}">{{ client.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Shift</label><select class="form-select" name="shift_type">{% for shift in shifts %}<option>{{ shift }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Role</label><input class="form-control" name="role" value="{{ assignment.role }}"></div><div class="col-md-6"><label class="form-label">Site Location</label><input class="form-control" name="site_location"></div><div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes"></textarea></div><div class="col-12"><button class="btn btn-info">Transfer Worker</button></div></form></section>{% endblock %}
