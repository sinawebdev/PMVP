{% extends "base.html" %}
{% block page_title %}Job Completion Report{% endblock %}
{% block content %}<section class="panel"><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Completion Status</label><select class="form-select" name="completion_status">{% for status in statuses %}<option {% if report.completion_status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Workers Present</label><input class="form-control" type="number" name="workers_present" value="{{ report.workers_present or 0 }}"></div><div class="col-md-4"><label class="form-label">Workers Absent</label><input class="form-control" type="number" name="workers_absent" value="{{ report.workers_absent or 0 }}"></div><div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="checklist_completed" {% if report.checklist_completed %}checked{% endif %}><label class="form-check-label">Checklist completed</label></div></div><div class="col-md-6"><label class="form-label">Issues Found</label><textarea class="form-control" name="issues_found">{{ report.issues_found or "" }}</textarea></div><div class="col-md-6"><label class="form-label">Client Feedback</label><textarea class="form-control" name="client_feedback">{{ report.client_feedback or "" }}</textarea></div><div class="col-12"><label class="form-label">Supervisor Comments</label><textarea class="form-control" name="supervisor_comments">{{ report.supervisor_comments or "" }}</textarea></div><div class="col-12"><button class="btn btn-success">Submit Report</button></div></form></section>{% endblock %}
