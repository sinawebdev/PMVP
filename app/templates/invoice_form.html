{% extends "base.html" %}{% block page_title %}{{ "Edit" if invoice else "New" }} Invoice{% endblock %}{% block content %}<section class="panel"><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Client</label><select class="form-select" name="client_company_id">{% for client in clients %}<option value="{{ client.id }}" {% if invoice and invoice.client_company_id == client.id %}selected{% endif %}>{{ client.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Invoice Number</label><input class="form-control" name="invoice_number" value="{{ invoice.invoice_number if invoice else '' }}"></div><div class="col-md-4"><label class="form-label">Invoice Type</label><select class="form-select" name="invoice_type">{% for type in invoice_types %}<option {% if invoice and invoice.invoice_type == type %}selected{% endif %}>{{ type }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Invoice Date</label><input class="form-control" type="date" name="invoice_date" value="{{ invoice.invoice_date if invoice else '' }}"></div><div class="col-md-3"><label class="form-label">Due Date</label><input class="form-control" type="date" name="due_date" value="{{ invoice.due_date if invoice else '' }}"></div><div class="col-md-3"><label class="form-label">Billing Start</label><input class="form-control" type="date" name="billing_period_start" value="{{ invoice.billing_period_start if invoice else '' }}"></div><div class="col-md-3"><label class="form-label">Billing End</label><input class="form-control" type="date" name="billing_period_end" value="{{ invoice.billing_period_end if invoice else '' }}"></div><div class="col-md-3"><label class="form-label">Tax Amount</label><input class="form-control" name="tax_amount" value="{{ invoice.tax_amount if invoice else 0 }}"></div><div class="col-md-3"><label class="form-label">Discount</label><input class="form-control" name="discount_amount" value="{{ invoice.discount_amount if invoice else 0 }}"></div><div class="col-md-3"><label class="form-label">Status</label><select class="form-select" name="status">{% for status in statuses %}<option {% if invoice and invoice.status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div>{% if not invoice %}<div class="col-md-6"><label class="form-label">Item Description</label><input class="form-control" name="description"></div><div class="col-md-3"><label class="form-label">Quantity</label><input class="form-control" name="quantity" value="1"></div><div class="col-md-3"><label class="form-label">Unit Price</label><input class="form-control" name="unit_price" value="0"></div>{% endif %}<div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes">{{ invoice.notes if invoice else '' }}</textarea></div><div class="col-12"><button class="btn btn-primary">Save Invoice</button></div></form></section>{% endblock %}
