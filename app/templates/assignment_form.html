{% extends "base.html" %}
{% block page_title %}{{ "Edit" if assignment.id else "New" }} Worker Assignment{% endblock %}
{% block content %}
<section class="panel">
    {% for warning in warnings %}<div class="alert alert-warning">{{ warning }}</div>{% endfor %}
    <form method="post" class="row g-3">
        <div class="col-md-6"><label class="form-label">Worker</label><select class="form-select" name="employee_id" required>{% for employee in employees %}<option value="{{ employee.id }}" {% if assignment.employee_id == employee.id %}selected{% endif %}>{{ employee.full_name }} - {{ employee.staff_id }}</option>{% endfor %}</select></div>
        <div class="col-md-6"><label class="form-label">Client Company</label><select class="form-select" name="client_company_id" required>{% for client in clients %}<option value="{{ client.id }}" {% if assignment.client_company_id == client.id %}selected{% endif %}>{{ client.name }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Role</label><input class="form-control" name="role" value="{{ assignment.role or '' }}" required></div>
        <div class="col-md-4"><label class="form-label">Site Location</label><input class="form-control" name="site_location" value="{{ assignment.site_location or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Shift</label><select class="form-select" name="shift_type">{% for shift in shifts %}<option {% if assignment.shift_type == shift %}selected{% endif %}>{{ shift }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Start Date</label><input class="form-control" type="date" name="assignment_start_date" value="{{ assignment.assignment_start_date }}"></div>
        <div class="col-md-4"><label class="form-label">End Date</label><input class="form-control" type="date" name="assignment_end_date" value="{{ assignment.assignment_end_date or '' }}"></div>
        <div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status">{% for status in statuses %}<option {% if assignment.status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div>
        <div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" name="notes">{{ assignment.notes or "" }}</textarea></div>
        <div class="col-12"><button class="btn btn-primary">Save Assignment</button></div>
    </form>
</section>
{% endblock %}
