<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Payslip link unavailable · {{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}">
    <style>
        body { color: var(--ink); font-family: var(--font-sans); margin: 0; min-height: 100vh; }
        .wrap { max-width: 480px; margin: 0 auto; padding: 64px 18px; text-align: center; }
        .wrap h1 { font-size: 21px; font-weight: 750; margin: 18px 0 10px; }
        .wrap p { color: var(--muted); line-height: 1.6; margin: 0; }
        .brand-mark { height: 56px; width: 56px; border-radius: var(--radius-lg); font-size: 1.3rem; }
    </style>
</head>
<body class="brand-shell-bg">
<div class="wrap">
    <div class="brand-mark">{{ app_brand_mark }}</div>
    <h1>This payslip link is no longer valid</h1>
    <p>
        The link may have expired or been mistyped. Please contact your employer's
        payroll office to have your latest payslip sent again.
    </p>
</div>
</body>
</html>
