<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Payslip link unavailable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f1f5f4; color:#132034; }
        .wrap { max-width:480px; margin:0 auto; padding:64px 18px; text-align:center; }
        .mark { width:56px; height:56px; border-radius:16px; background:#FACC15; color:#132034;
            font-weight:700; display:inline-flex; align-items:center; justify-content:center;
            font-size:1.3rem; margin-bottom:18px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="mark">CN</div>
    <h1 class="h4">This payslip link is no longer valid</h1>
    <p class="text-muted">
        The link may have expired or been mistyped. Please contact your employer's
        payroll office to have your latest payslip sent again.
    </p>
</div>
</body>
</html>
