{% extends "base.html" %}
{% block page_title %}{{ "Edit" if job.id else "New" }} Cleaning Job{% endblock %}
{% block content %}<section class="panel"><form method="post" class="row g-3"><div class="col-md-6"><label class="form-label">Client Company</label><select class="form-select" name="client_company_id">{% for client in clients %}<option value="{{ client.id }}" {% if job.client_company_id == client.id %}selected{% endif %}>{{ client.name }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Job Title</label><input class="form-control" name="job_title" value="{{ job.job_title or '' }}" required></div><div class="col-md-4"><label class="form-label">Job Type</label><select class="form-select" name="job_type">{% for type in job_types %}<option {% if job.job_type == type %}selected{% endif %}>{{ type }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Location</label><input class="form-control" name="location" value="{{ job.location or '' }}"></div><div class="col-md-4"><label class="form-label">Scheduled Date</label><input class="form-control" type="date" name="scheduled_date" value="{{ job.scheduled_date }}"></div><div class="col-md-3"><label class="form-label">Start Time</label><input class="form-control" type="time" name="start_time" value="{{ job.start_time or '' }}"></div><div class="col-md-3"><label class="form-label">End Time</label><input class="form-control" type="time" name="end_time" value="{{ job.end_time or '' }}"></div><div class="col-md-3"><label class="form-label">Supervisor</label><select class="form-select" name="supervisor_id"><option value="">Unassigned</option>{% for supervisor in supervisors %}<option value="{{ supervisor.id }}" {% if job.supervisor_id == supervisor.id %}selected{% endif %}>{{ supervisor.name }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Status</label><select class="form-select" name="status">{% for status in statuses %}<option {% if job.status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Checklist</label><textarea class="form-control" name="checklist">{{ job.checklist or "" }}</textarea></div><div class="col-md-6"><label class="form-label">Notes</label><textarea class="form-control" name="notes">{{ job.notes or "" }}</textarea></div><div class="col-12"><button class="btn btn-primary">Save Cleaning Job</button></div></form></section>{% endblock %}
