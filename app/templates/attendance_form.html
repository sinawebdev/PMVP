{% extends "base.html" %}
{% block page_title %}{{ "Edit" if record.id else "New" }} Attendance{% endblock %}
{% block content %}<section class="panel">{% for warning in warnings %}<div class="alert alert-warning">{{ warning }}</div>{% endfor %}<form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Worker</label><select class="form-select" name="employee_id">{% for employee in employees %}<option value="{{ employee.id }}" {% if record.employee_id == employee.id %}selected{% endif %}>{{ employee.full_name }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Client Company</label><select class="form-select" name="client_company_id">{% for client in clients %}<option value="{{ client.id }}" {% if record.client_company_id == client.id %}selected{% endif %}>{{ client.name }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Date</label><input class="form-control" type="date" name="work_date" value="{{ record.work_date }}"></div><div class="col-md-3"><label class="form-label">Clock In</label><input class="form-control" type="time" name="clock_in" value="{{ record.clock_in or '' }}"></div><div class="col-md-3"><label class="form-label">Clock Out</label><input class="form-control" type="time" name="clock_out" value="{{ record.clock_out or '' }}"></div><div class="col-md-3"><label class="form-label">Status</label><select class="form-select" name="attendance_status">{% for status in statuses %}<option {% if record.attendance_status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div>
    <div class="col-12"><label class="form-label">Remarks</label><textarea class="form-control" name="remarks">{{ record.remarks or "" }}</textarea></div><div class="col-12"><button class="btn btn-primary">Save Attendance</button></div>
</form></section>{% endblock %}
