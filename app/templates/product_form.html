{% extends "base.html" %}{% block page_title %}New Product{% endblock %}{% block content %}<section class="panel"><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Product Name</label><input class="form-control" name="product_name" required></div><div class="col-md-4"><label class="form-label">SKU</label><input class="form-control" name="sku" required></div><div class="col-md-4"><label class="form-label">Category</label><select class="form-select" name="category">{% for category in categories %}<option>{{ category }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Unit</label><input class="form-control" name="unit" value="Each"></div><div class="col-md-3"><label class="form-label">Unit Price</label><input class="form-control" name="default_unit_price" value="0"></div><div class="col-md-3"><label class="form-label">Current Stock</label><input class="form-control" name="current_stock" value="0"></div><div class="col-md-3"><label class="form-label">Reorder Level</label><input class="form-control" name="reorder_level" value="0"></div><div class="col-md-6"><label class="form-label">Supplier</label><select class="form-select" name="supplier_id"><option value="">None</option>{% for supplier in suppliers %}<option value="{{ supplier.id }}">{{ supplier.name }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Status</label><input class="form-control" name="status" value="Active"></div><div class="col-12"><button class="btn btn-primary">Save Product</button></div></form></section>{% endblock %}
