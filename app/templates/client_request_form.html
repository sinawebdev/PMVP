{% extends "base.html" %}{% block page_title %}New Service Request{% endblock %}{% block content %}<section class="panel"><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Request Type</label><select class="form-select" name="request_type">{% for type in request_types %}<option>{{ type }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Priority</label><select class="form-select" name="priority">{% for priority in priorities %}<option>{{ priority }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Requested Date</label><input class="form-control" type="date" name="requested_date"></div><div class="col-md-8"><label class="form-label">Title</label><input class="form-control" name="title" required></div><div class="col-md-4"><label class="form-label">Workers Requested</label><input class="form-control" type="number" name="number_of_workers_requested" value="0"></div><div class="col-md-4"><label class="form-label">Start Time</label><input class="form-control" type="time" name="preferred_start_time"></div><div class="col-md-4"><label class="form-label">End Time</label><input class="form-control" type="time" name="preferred_end_time"></div><div class="col-md-4"><label class="form-label">Location</label><input class="form-control" name="location"></div><div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description"></textarea></div><div class="col-12"><button class="btn btn-primary">Submit Request</button></div></form></section>{% endblock %}
